<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A small React notification app" />
    <title>Notification App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      html,body,#root { height: 100%; }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        background: linear-gradient(180deg,#f7fafc,#eef2f7);
        color: #0f172a;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
      }
      .app-shell{
        min-height:100%;
        display:flex;
        flex-direction:column;
      }
      /* subtle container centering for non-fullscreen layouts */
      .app-container{
        width:100%;
        max-width:1100px;
        margin:24px auto;
        padding:20px;
        box-sizing:border-box;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="app-container">
        <div id="root" aria-live="polite"></div>
      </div>
    </div>
    <!-- React will mount into #root -->
  </body>
</html>
